<h2>ME-90 MIDI TEST</h2>

<button onclick="connect()">CONNECT ME-90</button>
<button onclick="test()">SEND TEST</button>

<script>
let output;

async function connect() {
  const midi = await navigator.requestMIDIAccess({ sysex: false });

  for (let o of midi.outputs.values()) {
    console.log(o.name);
    if (o.name.toLowerCase().includes("boss") ||
        o.name.toLowerCase().includes("me")) {
      output = o;
    }
  }

  if (output) {
    alert("Connected: " + output.name);
  } else {
    alert("ME-90 not found");
  }
}

// TEST MESSAGE (Program Change 0)
function test() {
  if (!output) return alert("Not connected");

  // Program Change channel 1
  output.send([0xC0, 0x00]);

  alert("Test sent");
}
</script>
