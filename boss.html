<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 · MIDI Test</title>
<style>
  :root{
    --bg:#14110f; --panel:#1c1815; --edge:#2a241f;
    --amber:#e8742c; --green:#4caf6a; --red:#c0463a;
    --text:#ece6da; --dim:#948b7c;
    --mono:"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    --display:"Oswald","Arial Narrow",sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--mono);}
  .wrap{max-width:480px;margin:0 auto;padding:20px 16px 50px;}
  .brand{font-family:var(--display);font-weight:700;font-size:19px;}
  .brand span{color:var(--amber);}
  .sub{font-size:10.5px;color:var(--dim);letter-spacing:1px;text-transform:uppercase;margin:2px 0 16px;}

  select{ width:100%; background:var(--panel); color:var(--text); border:1px solid var(--edge);
    font-family:var(--mono); font-size:12px; padding:9px; border-radius:6px; margin-bottom:10px; }

  .status-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);margin-bottom:16px;}
  .dot{width:8px;height:8px;border-radius:50%;background:#5a4a3a;flex-shrink:0;}
  .dot.live{background:var(--green);box-shadow:0 0 8px var(--green);}
  .dot.error{background:var(--red);box-shadow:0 0 8px var(--red);}

  .section{background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:14px;margin-bottom:14px;}
  .section-title{font-size:10.5px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;}

  .row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .row label{width:64px;font-size:11px;color:var(--dim);}
  .row input[type=number]{
    width:60px; background:#211c18; border:1px solid var(--edge); color:var(--text);
    font-family:var(--mono); font-size:13px; padding:7px; border-radius:6px; text-align:center;
  }
  .sendbtn{
    flex:1; background:var(--amber); border:none; color:#1a1410; font-weight:700;
    font-size:12px; padding:9px; border-radius:6px; cursor:pointer; letter-spacing:0.5px;
  }
  .sendbtn:active{ transform:scale(0.97); }

  .quickgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .qbtn{ background:#211c18; border:1px solid var(--edge); border-radius:7px; padding:11px 4px;
    text-align:center; font-size:12px; color:var(--dim); cursor:pointer; }
  .qbtn:active{ transform:scale(0.95); background:var(--amber); color:#1a1410; }

  .log{background:#100d0b;border:1px solid var(--edge);border-radius:8px;height:260px;overflow-y:auto;padding:6px 0;font-size:11px;}
  .log-row{display:grid;grid-template-columns:62px 26px 1fr;gap:8px;padding:5px 12px;border-bottom:1px solid #1c1814;}
  .log-row:last-child{border-bottom:none;}
  .log-time{color:var(--dim);}
  .log-tag.out{color:var(--amber);font-weight:700;} .log-tag.in{color:var(--green);font-weight:700;}
  .log-empty{padding:30px 16px;color:var(--dim);text-align:center;font-size:11.5px;}
  .clear{background:none;border:1px solid var(--edge);color:var(--dim);font-size:10px;padding:3px 8px;border-radius:4px;font-family:var(--mono);float:right;}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">ME-90 <span>MIDI TEST</span></div>
  <div class="sub">Raw message sender + live monitor — nothing guessed, nothing automatic</div>

  <select id="portSelect"><option>No MIDI devices found</option></select>
  <div class="status-row"><div class="dot" id="statusDot"></div><span id="statusText">Waiting for Web MIDI access…</span></div>

  <div class="section">
    <div class="section-title">Send Raw Message</div>
    <div class="row">
      <label>Status</label><input type="number" id="byte0" min="0" max="255" value="176">
      <label>Data 1</label><input type="number" id="byte1" min="0" max="127" value="1">
      <label>Data 2</label><input type="number" id="byte2" min="0" max="127" value="127">
    </div>
    <div class="row">
      <button class="sendbtn" id="sendRaw">SEND</button>
    </div>
    <div class="quickgrid">
      <div class="qbtn" id="qPC0">PC → 0</div>
      <div class="qbtn" id="qPC1">PC → 1</div>
      <div class="qbtn" id="qPC2">PC → 2</div>
      <div class="qbtn" id="qCCon">CC1 → 127</div>
      <div class="qbtn" id="qCCoff">CC1 → 0</div>
      <div class="qbtn" id="qAllNotesOff">All notes off</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Live Log <button class="clear" id="clearBtn">Clear</button></div>
    <div class="log" id="log"><div class="log-empty">Connect, then send a message — every byte in and out shows here.</div></div>
  </div>
</div>

<script>
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const portSelect = document.getElementById('portSelect');
const logEl = document.getElementById('log');

let midiAccess = null, currentInput = null, currentOutput = null;

function setStatus(state, text){ statusDot.className='dot'+(state?' '+state:''); statusText.textContent=text; }
function formatTime(){ const d=new Date(); return d.toLocaleTimeString([],{hour12:false})+'.'+String(d.getMilliseconds()).padStart(3,'0'); }
function decode(bytes){
  const status = bytes[0] & 0xF0, ch=(bytes[0]&0x0F)+1;
  if (status===0xC0) return `Program Change → ${bytes[1]} (ch ${ch})`;
  if (status===0xB0) return `CC ${bytes[1]} = ${bytes[2]} (ch ${ch})`;
  if (status===0x90) return `Note On ${bytes[1]} vel ${bytes[2]} (ch ${ch})`;
  if (status===0x80) return `Note Off ${bytes[1]} (ch ${ch})`;
  return '';
}
function addLog(tag, hex, detail){
  const empty = logEl.querySelector('.log-empty'); if(empty) empty.remove();
  const row = document.createElement('div'); row.className='log-row';
  row.innerHTML = `<span class="log-time">${formatTime()}</span><span class="log-tag ${tag}">${tag.toUpperCase()}</span><span>${hex} <span style="color:var(--dim)">${detail||''}</span></span>`;
  logEl.prepend(row);
}

function handleMessage(event){
  const data = event.data;
  const hex = Array.from(data).map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
  addLog('in', hex, decode(data));
}
function attachInput(input){ if(currentInput) currentInput.onmidimessage=null; currentInput=input; if(input) input.onmidimessage=handleMessage; }
function attachOutput(output){ currentOutput = output; }

function send(bytes){
  if (!currentOutput){ addLog('out','—','not connected'); return; }
  try{
    currentOutput.send(bytes);
    const hex = bytes.map(b=>b.toString(16).padStart(2,'0').toUpperCase()).join(' ');
    addLog('out', hex, decode(bytes));
  }catch(e){ addLog('out','—','error: '+e.message); }
}

function refreshPortList(){
  portSelect.innerHTML = '';
  const inputs = Array.from(midiAccess.inputs.values());
  const outputs = Array.from(midiAccess.outputs.values());
  if (inputs.length===0 && outputs.length===0){
    portSelect.innerHTML = '<option>No MIDI devices found</option>';
    setStatus('error','No MIDI devices detected.');
    return;
  }
  const names = new Set([...inputs.map(i=>i.name), ...outputs.map(o=>o.name)]);
  names.forEach(name=>{
    const opt = document.createElement('option'); opt.value=name; opt.textContent=name;
    portSelect.appendChild(opt);
  });
  const preferred = [...names].find(n=>/me-?90/i.test(n)) || [...names][0];
  portSelect.value = preferred;
  selectDevice(preferred);
}
function selectDevice(name){
  const input = Array.from(midiAccess.inputs.values()).find(i=>i.name===name);
  const output = Array.from(midiAccess.outputs.values()).find(o=>o.name===name);
  attachInput(input); attachOutput(output);
  setStatus('live', `Connected to "${name}"${input?' · listening':''}${output?' · ready to send':''}`);
}
portSelect.addEventListener('change', ()=>selectDevice(portSelect.value));
document.getElementById('clearBtn').addEventListener('click', ()=>{
  logEl.innerHTML = '<div class="log-empty">Connect, then send a message — every byte in and out shows here.</div>';
});

document.getElementById('sendRaw').addEventListener('click', ()=>{
  const b0 = parseInt(document.getElementById('byte0').value)||0;
  const b1 = parseInt(document.getElementById('byte1').value)||0;
  const b2 = parseInt(document.getElementById('byte2').value)||0;
  send([b0,b1,b2]);
});
document.getElementById('qPC0').addEventListener('click', ()=>send([0xC0,0]));
document.getElementById('qPC1').addEventListener('click', ()=>send([0xC0,1]));
document.getElementById('qPC2').addEventListener('click', ()=>send([0xC0,2]));
document.getElementById('qCCon').addEventListener('click', ()=>send([0xB0,1,127]));
document.getElementById('qCCoff').addEventListener('click', ()=>send([0xB0,1,0]));
document.getElementById('qAllNotesOff').addEventListener('click', ()=>send([0xB0,123,0]));

if (!navigator.requestMIDIAccess){
  setStatus('error','This browser does not support Web MIDI. Use Chrome or Edge.');
} else {
  navigator.requestMIDIAccess({ sysex: true }).then(access=>{
    midiAccess = access;
    refreshPortList();
    access.onstatechange = refreshPortList;
  }).catch(err=>{
    setStatus('error','MIDI access denied: '+err.message);
  });
}
</script>
</body>
</html>
