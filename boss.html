<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 · Interface #0</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0f11; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 12px; color: #e8edf2; touch-action: manipulation; }
  .app { max-width: 500px; margin: 0 auto; background: #1a1e22; border-radius: 28px; padding: 20px 16px; border: 1px solid #2a2f35; }
  .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 14px; border-bottom: 1px solid #282d33; margin-bottom: 16px; }
  .header h1 { font-size: 20px; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .led { width: 10px; height: 10px; border-radius: 50%; background: #3a4149; transition: 0.2s; }
  .led.on { background: #22c55e; box-shadow: 0 0 12px #22c55e66; }
  .led.error { background: #ef4444; }
  .section { background: #14181c; border-radius: 20px; padding: 14px; margin-bottom: 14px; border: 1px solid #262c32; }
  .section-title { font-size: 11px; text-transform: uppercase; color: #7e8892; margin-bottom: 10px; letter-spacing: 0.5px; }
  .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .btn-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .btn {
    background: #1f242a;
    border: 1px solid #313840;
    border-radius: 30px;
    padding: 14px 6px;
    text-align: center;
    font-weight: 600;
    font-size: 14px;
    color: #aab3bd;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: inset 0 -3px 0 #0d1013;
    transition: all 0.06s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.92); }
  .btn.active { background: #3b82f6; border-color: #60a5fa; color: white; box-shadow: inset 0 -3px 0 #1d4ed8; }
  .btn.on { background: #1a3d66; border-color: #3b82f6; color: white; box-shadow: inset 0 -3px 0 #0d2a4a; }
  .btn.primary { background: #2a4b74; border-color: #3b82f6; color: white; box-shadow: inset 0 -3px 0 #1a365d; }
  .btn-danger { background: #742a2a; border-color: #f63b3b; color: white; box-shadow: inset 0 -3px 0 #5a1a1a; }
  .btn-success { background: #1a4b2a; border-color: #22c55e; color: white; box-shadow: inset 0 -3px 0 #0d331a; }
  .btn-connect {
    background: #1a4b2a;
    border-color: #22c55e;
    color: white;
    padding: 16px;
    font-size: 16px;
    width: 100%;
    border-radius: 30px;
    border: 1px solid #22c55e66;
    cursor: pointer;
    font-weight: 600;
  }
  .slider-group { display: flex; flex-direction: column; gap: 12px; }
  .slider-item { display: flex; align-items: center; gap: 10px; }
  .slider-item label { width: 48px; font-size: 12px; color: #9aa4ae; }
  .slider-item input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #252b32;
    border-radius: 10px;
    outline: none;
    border: 1px solid #31383f;
  }
  .slider-item input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: #c8d2dd;
    border-radius: 50%;
    cursor: pointer;
    border: 1px solid #5a6672;
  }
  .slider-value { min-width: 30px; text-align: right; font-weight: 600; font-size: 13px; color: #bcc6d0; }
  .log {
    background: #0d1013;
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 11px;
    font-family: monospace;
    color: #6b757f;
    border: 1px solid #21262c;
    min-height: 80px;
    margin-top: 8px;
    word-break: break-all;
    max-height: 150px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  .info-box {
    background: #0d1013;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 12px;
    color: #8a939d;
    border: 1px solid #21262c;
    margin-bottom: 12px;
  }
  .info-box strong { color: #bcc6d0; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .btn-row .btn { padding: 10px; font-size: 12px; }
  .endpoint-info { font-size: 12px; color: #22c55e; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎛️ ME-90 <span style="font-size:12px;color:#7e8892;">iface #0</span></h1>
    <div class="status">
      <span id="statusText">offline</span>
      <span class="led" id="statusLed"></span>
    </div>
  </div>

  <button class="btn-connect" id="btnConnect">🔌 CONNECT TO ME-90</button>

  <div class="info-box" style="margin-top: 10px;">
    <strong>Interface:</strong> <span id="interfaceInfo">#0</span> &nbsp;|&nbsp;
    <strong>Endpoint OUT:</strong> <span id="endpointInfo">—</span><br>
    <strong>Status:</strong> <span id="statusMsg" style="color:#f59e0b;">Tap CONNECT</span>
  </div>

  <!-- Bank -->
  <div class="section">
    <div class="section-title">📁 Bank</div>
    <div class="btn-grid">
      <button class="btn" data-bank="0">1</button>
      <button class="btn" data-bank="1">2</button>
      <button class="btn" data-bank="2">3</button>
      <button class="btn" data-bank="3">4</button>
      <button class="btn" data-bank="4">5</button>
    </div>
  </div>

  <!-- FX -->
  <div class="section">
    <div class="section-title">🎚️ Effects</div>
    <div class="btn-grid-3">
      <button class="btn" data-fx="od">OD</button>
      <button class="btn" data-fx="ds">DS</button>
      <button class="btn" data-fx="mod">MOD</button>
      <button class="btn" data-fx="delay">DELAY</button>
      <button class="btn" data-fx="reverb">REVERB</button>
      <button class="btn" data-fx="chorus">CHORUS</button>
    </div>
  </div>

  <!-- Params -->
  <div class="section">
    <div class="section-title">🎛️ Parameters</div>
    <div class="slider-group">
      <div class="slider-item"><label>GAIN</label><input type="range" min="0" max="127" value="60" id="param-gain"><span class="slider-value" id="val-gain">60</span></div>
      <div class="slider-item"><label>TONE</label><input type="range" min="0" max="127" value="64" id="param-tone"><span class="slider-value" id="val-tone">64</span></div>
      <div class="slider-item"><label>LEVEL</label><input type="range" min="0" max="127" value="80" id="param-level"><span class="slider-value" id="val-level">80</span></div>
      <div class="slider-item"><label>TIME</label><input type="range" min="0" max="127" value="50" id="param-time"><span class="slider-value" id="val-time">50</span></div>
      <div class="slider-item"><label>DEPTH</label><input type="range" min="0" max="127" value="40" id="param-depth"><span class="slider-value" id="val-depth">40</span></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn" id="btnTap">⏱ TAP</button>
    <button class="btn primary" id="btnSave">💾 SAVE</button>
  </div>
  <div class="btn-row">
    <button class="btn" id="btnTest">🔬 TEST (OD ON)</button>
    <button class="btn btn-danger" id="btnReset">↺ RESET</button>
  </div>

  <div class="log" id="logArea">🔍 Tap CONNECT to pair with your ME-90</div>
</div>

<script>
  (function() {
    'use strict';

    // ----- STATE -----
    const state = {
      bank: 0,
      fx: { od: false, ds: false, mod: false, delay: false, reverb: false, chorus: false },
      params: { gain: 60, tone: 64, level: 80, time: 50, depth: 40 }
    };

    let usbDevice = null;
    let usbEndpointOut = null;
    let usbInterfaceNum = 0;

    // ----- CC MAP -----
    const CC = {
      GAIN: 1, TONE: 2, LEVEL: 3, TIME: 4, DEPTH: 5,
      OD: 16, DS: 17, MOD: 18, DELAY: 19, REVERB: 20, CHORUS: 21,
      TAP: 64
    };

    // ----- DOM -----
    const logArea = document.getElementById('logArea');
    const statusText = document.getElementById('statusText');
    const statusLed = document.getElementById('statusLed');
    const statusMsg = document.getElementById('statusMsg');
    const endpointInfo = document.getElementById('endpointInfo');
    const interfaceInfo = document.getElementById('interfaceInfo');
    const bankBtns = document.querySelectorAll('[data-bank]');
    const fxBtns = document.querySelectorAll('[data-fx]');
    const sliders = {
      gain: document.getElementById('param-gain'),
      tone: document.getElementById('param-tone'),
      level: document.getElementById('param-level'),
      time: document.getElementById('param-time'),
      depth: document.getElementById('param-depth')
    };
    const valLabels = {
      gain: document.getElementById('val-gain'),
      tone: document.getElementById('val-tone'),
      level: document.getElementById('val-level'),
      time: document.getElementById('val-time'),
      depth: document.getElementById('val-depth')
    };

    // ----- LOG -----
    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logArea.textContent = `[${time}] ${msg}\n` + logArea.textContent.split('\n').slice(0, 30).join('\n');
      console.log('[ME-90]', msg);
    }

    // ----- SEND USB -----
    async function sendUSB(data, description = '') {
      if (!usbDevice || usbEndpointOut === null) {
        log('❌ Not connected');
        return false;
      }

      try {
        const packet = new Uint8Array(4);
        packet[0] = data[0] || 0;
        packet[1] = data[1] || 0;
        packet[2] = data[2] || 0;
        packet[3] = 0;

        const hex = Array.from(packet).map(b => '0x' + b.toString(16).padStart(2, '0')).join(' ');
        log(`📤 ${description}: [${hex}]`);

        const result = await usbDevice.transferOut(usbEndpointOut, packet);
        
        if (result.status === 'ok') {
          log(`✅ Sent ${result.bytesWritten} bytes`);
          return true;
        } else {
          log(`⚠️ Transfer status: ${result.status}`);
          return false;
        }
      } catch(e) {
        log(`❌ USB error: ${e.message}`);
        return false;
      }
    }

    async function sendCC(channel, cc, value) {
      const status = 0xB0 | (channel & 0x0F);
      return await sendUSB([status, cc, Math.min(127, Math.max(0, value))], `CC#${cc}=${value}`);
    }

    async function sendPC(channel, program) {
      const status = 0xC0 | (channel & 0x0F);
      return await sendUSB([status, Math.min(127, Math.max(0, program))], `PC#${program}`);
    }

    // ----- CONNECT -----
    async function connectUSB() {
      try {
        if (!navigator.usb) {
          log('❌ WebUSB not supported');
          statusMsg.textContent = '❌ WebUSB not supported';
          return;
        }

        log('🔍 Requesting USB device...');
        statusMsg.textContent = '⏳ Select ME-90 from popup...';

        const device = await navigator.usb.requestDevice({
          filters: [
            { vendorId: 0x0582, productId: 0x02e0 }
          ]
        });

        log(`✅ Found: ${device.productName || 'ME-90'}`);
        await device.open();
        log('✅ Device opened');

        // Try to claim interface #0 (the one that worked!)
        let claimed = false;
        let foundEndpoint = null;
        let foundInterface = null;

        // First, list all interfaces and endpoints
        for (const config of device.configurations) {
          for (const iface of config.interfaces) {
            const num = iface.interfaceNumber;
            const alt = iface.alternate;
            const endpoints = alt.endpoints || [];
            
            log(`Interface #${num}: ${endpoints.length} endpoints`);
            
            for (const ep of endpoints) {
              const epNum = ep.endpointNumber;
              const dir = ep.direction;
              const type = ep.type;
              log(`  Endpoint 0x${epNum.toString(16)}: ${dir} (${type})`);
              
              // Try to claim this interface and find OUT endpoint
              try {
                await device.claimInterface(num);
                log(`✅ Claimed interface #${num}`);
                
                if (dir === 'out') {
                  foundEndpoint = epNum;
                  foundInterface = num;
                  log(`✅ Found OUT endpoint: 0x${epNum.toString(16)} on interface #${num}`);
                }
                claimed = true;
              } catch(e) {
                log(`❌ Could not claim #${num}: ${e.message}`);
              }
            }
          }
        }

        // If we didn't find an OUT endpoint on a claimed interface, try harder
        if (!foundEndpoint) {
          // Try to claim interface #0 specifically (it worked before)
          try {
            await device.claimInterface(0);
            log('✅ Claimed interface #0');
            
            // Scan endpoints on interface #0
            for (const config of device.configurations) {
              for (const iface of config.interfaces) {
                if (iface.interfaceNumber === 0) {
                  for (const ep of iface.alternate.endpoints || []) {
                    if (ep.direction === 'out') {
                      foundEndpoint = ep.endpointNumber;
                      foundInterface = 0;
                      log(`✅ Found OUT endpoint on interface #0: 0x${foundEndpoint.toString(16)}`);
                    }
                  }
                }
              }
            }
          } catch(e) {
            log(`❌ Could not claim interface #0: ${e.message}`);
          }
        }

        if (!foundEndpoint) {
          log('❌ No OUT endpoint found');
          statusMsg.textContent = '❌ No OUT endpoint found';
          return;
        }

        usbDevice = device;
        usbEndpointOut = foundEndpoint;
        usbInterfaceNum = foundInterface;

        interfaceInfo.textContent = `#${foundInterface}`;
        endpointInfo.textContent = `0x${foundEndpoint.toString(16)}`;

        statusText.textContent = 'connected ✅';
        statusLed.className = 'led on';
        statusMsg.textContent = '✅ Connected! Testing...';
        log('✅ USB connection ready!');

        // Test: Send a MIDI message
        setTimeout(async () => {
          log('🔬 Sending test: OD ON');
          await sendCC(0, 16, 127);
          setTimeout(async () => {
            log('🔬 Sending test: OD OFF');
            await sendCC(0, 16, 0);
          }, 1000);
        }, 500);

        // Send full state
        setTimeout(sendAllState, 1500);

      } catch (err) {
        if (err.message && err.message.includes('cancelled')) {
          log('⛔ Cancelled');
          statusMsg.textContent = '⛔ Cancelled';
        } else {
          log(`❌ ${err.message}`);
          statusMsg.textContent = `❌ ${err.message}`;
          statusLed.className = 'led error';
        }
      }
    }

    // ----- SEND STATE -----
    async function sendAllState() {
      if (!usbDevice) {
        log('⚠️ Not connected');
        return;
      }

      log('📤 Sending state...');
      await sendPC(0, state.bank);

      const fxMap = { od: CC.OD, ds: CC.DS, mod: CC.MOD, delay: CC.DELAY, reverb: CC.REVERB, chorus: CC.CHORUS };
      for (const fx of Object.keys(fxMap)) {
        await sendCC(0, fxMap[fx], state.fx[fx] ? 127 : 0);
      }

      const paramMap = { gain: CC.GAIN, tone: CC.TONE, level: CC.LEVEL, time: CC.TIME, depth: CC.DEPTH };
      for (const param of Object.keys(paramMap)) {
        await sendCC(0, paramMap[param], state.params[param]);
      }

      log('✅ State sent');
      statusMsg.textContent = '✅ Ready!';
    }

    // ----- TEST -----
    async function testMIDI() {
      log('🔬 TEST: Toggling OD');
      state.fx.od = !state.fx.od;
      updateUI();
      await sendCC(0, 16, state.fx.od ? 127 : 0);
      log(`🎚️ OD ${state.fx.od ? 'ON' : 'OFF'}`);
    }

    // ----- UI UPDATES -----
    function updateUI() {
      bankBtns.forEach((btn, idx) => btn.classList.toggle('active', idx === state.bank));
      fxBtns.forEach(btn => {
        btn.classList.toggle('on', state.fx[btn.dataset.fx]);
      });
      ['gain', 'tone', 'level', 'time', 'depth'].forEach(name => {
        const val = state.params[name];
        sliders[name].value = val;
        valLabels[name].textContent = val;
      });
    }

    // ----- INIT UI -----
    function initUI() {
      document.getElementById('btnConnect').addEventListener('click', connectUSB);
      document.getElementById('btnTest').addEventListener('click', testMIDI);

      // Bank
      bankBtns.forEach((btn, idx) => {
        btn.addEventListener('click', async () => {
          state.bank = idx;
          updateUI();
          await sendPC(0, idx);
          log(`📁 Bank ${idx + 1}`);
        });
        btn.addEventListener('touchend', e => { e.preventDefault(); btn.click(); });
      });

      // FX
      fxBtns.forEach(btn => {
        const fx = btn.dataset.fx;
        btn.addEventListener('click', async () => {
          state.fx[fx] = !state.fx[fx];
          updateUI();
          await sendCC(0, CC[fx.toUpperCase()], state.fx[fx] ? 127 : 0);
          log(`🎚️ ${fx.toUpperCase()} ${state.fx[fx] ? 'ON' : 'OFF'}`);
        });
        btn.addEventListener('touchend', e => { e.preventDefault(); btn.click(); });
      });

      // Sliders
      ['gain', 'tone', 'level', 'time', 'depth'].forEach(name => {
        const slider = sliders[name];
        slider.addEventListener('input', async () => {
          const val = parseInt(slider.value);
          state.params[name] = val;
          valLabels[name].textContent = val;
          await sendCC(0, CC[name.toUpperCase()], val);
        });
      });

      // Buttons
      document.getElementById('btnTap').addEventListener('click', async () => {
        await sendCC(0, CC.TAP, 127);
        setTimeout(async () => await sendCC(0, CC.TAP, 0), 30);
        log('⏱ TAP');
      });

      document.getElementById('btnSave').addEventListener('click', async () => {
        await sendCC(0, 80, 127);
        setTimeout(async () => await sendCC(0, 80, 0), 30);
        log('💾 Save');
      });

      document.getElementById('btnReset').addEventListener('click', async () => {
        state.bank = 0;
        state.fx = { od: false, ds: false, mod: false, delay: false, reverb: false, chorus: false };
        state.params = { gain: 60, tone: 64, level: 80, time: 50, depth: 40 };
        updateUI();
        await sendAllState();
        log('↺ Reset');
      });
    }

    // ----- START -----
    function init() {
      initUI();
      if (!navigator.usb) {
        log('❌ WebUSB not supported. Use Chrome.');
      } else {
        log('🔌 Tap CONNECT to pair with your ME-90');
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
</body>
</html>
