<button onclick="connectMIDI()">Connect MIDI</button>
<button onclick="sendPatch()">Patch 1</button>
<pre id="log"></pre>

<script>
let out;
const log = m => document.getElementById("log").textContent += m + "\n";

async function connectMIDI() {
  try {
    const midi = await navigator.requestMIDIAccess({ sysex: false });

    log("MIDI outputs:");
    for (const o of midi.outputs.values()) {
      log(o.name);
      out = o;
    }

    if (out) log("Selected: " + out.name);
    else log("No MIDI output found");

  } catch (e) {
    log("MIDI ERROR: " + e.message);
  }
}

function sendPatch() {
  if (!out) return log("No output selected");
  out.send([0xC0, 0x00]); 
  log("Program Change sent");
}
</script>
