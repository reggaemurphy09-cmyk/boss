<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 Phone Live</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#111;
  color:#f4f7fa;
  font-family:Arial,Helvetica,sans-serif;
  display:flex;
  justify-content:center;
}
.phone{
  width:390px;
  height:844px;
  margin:20px auto;
  background:linear-gradient(180deg,#030609,#071017);
  border:1px solid #2a3640;
  border-radius:28px;
  box-shadow:0 0 40px #000;
  overflow:hidden;
  position:relative;
}
.app{
  height:100%;
  overflow-y:auto;
  padding:14px 14px 82px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}
.logo{font-size:24px;font-weight:900}
.status{font-size:12px;color:#aaa}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#555}
.dot.on{background:#55e63d;box-shadow:0 0 8px #55e63d}
.btn{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid #55e63d;
  background:#102616;
  color:#55e63d;
  font-weight:bold;
  margin-bottom:10px;
}
.card{
  background:#0b1117;
  border:1px solid #2a3640;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}
.patchGrid{
  display:grid;
  grid-template-columns:1fr 1.7fr 1fr;
  text-align:center;
  align-items:center;
}
.label{font-size:11px;color:#9da5ad;letter-spacing:1px}
.bank{font-size:34px;color:#2f9bff;font-weight:900}
.patchName{font-size:25px;font-weight:900}
.patchNo{font-size:38px;font-weight:900}
.meta{
  display:flex;
  justify-content:space-around;
  border-top:1px solid #2a3640;
  margin-top:10px;
  padding-top:10px;
  font-size:14px;
}
.green{color:#55e63d}
.blue{color:#2f9bff}
.title{font-size:14px;font-weight:bold;margin-bottom:10px}
.chain{
  display:flex;
  gap:7px;
  align-items:center;
  overflow-x:auto;
}
.fx{
  min-width:64px;
  height:70px;
  border:2px solid #333;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:11px;
  font-weight:900;
}
.fx.on{border-color:#55e63d;color:#55e63d}
.fx.selected{border-color:#ffb02e;color:#ffb02e}
.fxIcon{font-size:22px}
.arrow{color:#888}
.expGrid{
  display:grid;
  grid-template-columns:1fr 105px;
  gap:12px;
  align-items:center;
}
.expMode{font-size:30px;color:#55e63d;font-weight:900}
.expValue{font-size:38px;color:#55e63d;font-weight:900}
.bar{display:flex;gap:2px;flex-wrap:wrap;margin-top:8px}
.seg{width:6px;height:18px;background:#1d252c;border-radius:2px}
.seg.on{background:#55e63d}
.pedalTitle{text-align:center;color:#55e63d;font-size:11px;font-weight:bold;margin-bottom:6px}
.pedal{
  height:150px;
  border:3px solid #55e63d;
  border-radius:12px;
  background:repeating-linear-gradient(135deg,#191919 0,#191919 9px,#0c0c0c 9px,#0c0c0c 18px);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#222;
  font-weight:900;
}
.stomps{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:9px;
}
.stomp{
  height:95px;
  border:2px solid #333;
  border-radius:12px;
  text-align:center;
  padding:9px;
  cursor:pointer;
}
.stomp.on{border-color:#55e63d;color:#55e63d}
.stomp.off{color:#777}
.stomp.ctl{border-color:#2f9bff;color:#2f9bff}
.stompNum{font-size:14px}
.stompName{font-size:20px;font-weight:900;margin:10px 0}
.nav{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:68px;
  background:#071017;
  border-top:1px solid #2a3640;
  display:grid;
  grid-template-columns:repeat(5,1fr);
}
.nav div{text-align:center;color:#888;font-size:11px;padding-top:9px}
.nav .active{color:#2f9bff}
.navIcon{font-size:21px}
</style>
</head>

<body>
<div class="phone">
  <div class="app">

    <div class="header">
      <div class="logo">BOSS ME-90</div>
      <div class="status"><span class="dot" id="dot"></span> <span id="statusText">DISCONNECTED</span></div>
    </div>

    <button class="btn" onclick="connectMIDI()">● CONNECT ME-90</button>

    <div class="card">
      <div class="patchGrid">
        <div>
          <div class="label">BANK</div>
          <div class="bank" id="bank">U2</div>
        </div>
        <div>
          <div class="label">PATCH NAME</div>
          <div class="patchName" id="patchName">ROCK LEAD</div>
        </div>
        <div>
          <div class="label">PATCH</div>
          <div class="patchNo" id="patchNo">1</div>
        </div>
      </div>
      <div class="meta">
        <div>Tempo <span class="blue">120</span></div>
        <div>CTL <span class="green">● ON</span></div>
      </div>
    </div>

    <div class="card">
      <div class="title">ACTIVE SIGNAL CHAIN</div>
      <div class="chain" id="chain"></div>
    </div>

    <div class="card expGrid">
      <div>
        <div class="title">EXPRESSION</div>
        <div class="label">MODE</div>
        <div class="expMode" id="expMode">WAH</div>
        <div class="label">LEVEL</div>
        <div class="expValue" id="expValue">82</div>
        <div class="bar" id="expBar"></div>
      </div>
      <div>
        <div class="pedalTitle">EXPRESSION PEDAL</div>
        <div class="pedal">BOSS</div>
      </div>
    </div>

    <div class="card">
      <div class="title">STOMPS</div>
      <div class="stomps" id="stomps"></div>
    </div>

  </div>

  <div class="nav">
    <div class="active"><div class="navIcon">⌂</div>LIVE</div>
    <div><div class="navIcon">☰</div>PATCHES</div>
    <div><div class="navIcon">▣</div>SETLIST</div>
    <div><div class="navIcon">≡</div>EDITOR</div>
    <div><div class="navIcon">⚙</div>SETTINGS</div>
  </div>
</div>

<script>
let midiInput, midiOutput;

let state={
  bank:"U2",
  patch:1,
  patchName:"ROCK LEAD",
  expMode:"WAH",
  expValue:82,
  effects:[
    {name:"COMP",icon:"▣",on:true},
    {name:"BOOST",icon:"●",on:true},
    {name:"PREAMP",icon:"▤",on:true,selected:true},
    {name:"EQ",icon:"≡",on:true},
    {name:"DELAY",icon:"◷",on:true},
    {name:"REVERB",icon:"≋",on:true}
  ],
  stomps:[
    {num:"1",name:"COMP",on:true},
    {num:"2",name:"BOOST",on:true},
    {num:"3",name:"MOD",on:false},
    {num:"4",name:"DELAY",on:true},
    {num:"CTL",name:"REVERB",on:true,ctl:true}
  ]
};

function render(){
  bank.textContent=state.bank;
  patchNo.textContent=state.patch;
  patchName.textContent=state.patchName;
  expMode.textContent=state.expMode;
  expValue.textContent=state.expValue;

  chain.innerHTML="<span>IN</span>";
  state.effects.filter(e=>e.on).forEach(e=>{
    chain.innerHTML+=`
      <span class="arrow">→</span>
      <div class="fx ${e.selected?'selected':'on'}">
        <div class="fxIcon">${e.icon}</div>
        <div>${e.name}</div>
      </div>`;
  });
  chain.innerHTML+="<span class='arrow'>→</span><span>OUT</span>";

  expBar.innerHTML="";
  for(let i=1;i<=28;i++){
    expBar.innerHTML+=`<div class="seg ${i<=state.expValue/3.6?'on':''}"></div>`;
  }

  stomps.innerHTML="";
  state.stomps.forEach((s,i)=>{
    stomps.innerHTML+=`
      <div class="stomp ${s.ctl?'ctl':s.on?'on':'off'}" onclick="toggleStomp(${i})">
        <div class="stompNum">${s.num}</div>
        <div class="stompName">${s.name}</div>
        <div>${s.on?'ON':'OFF'}</div>
      </div>`;
  });
}

async function connectMIDI(){
  if(!navigator.requestMIDIAccess){
    alert("Use Chrome or Edge on laptop.");
    return;
  }

  const access=await navigator.requestMIDIAccess({sysex:true});
  const inputs=[...access.inputs.values()];
  const outputs=[...access.outputs.values()];

  midiInput=inputs.find(i=>/me-?90|boss/i.test(i.name))||inputs[0];
  midiOutput=outputs.find(o=>/me-?90|boss/i.test(o.name))||outputs[0];

  if(midiInput)midiInput.onmidimessage=handleMIDI;

  dot.classList.add("on");
  statusText.textContent="CONNECTED";
}

function handleMIDI(e){
  const d=[...e.data];
  const type=d[0]&0xF0;

  if(type===0xC0){
    state.patch=d[1]+1;
    render();
  }

  if(type===0xB0){
    if(d[1]===7||d[1]===11||d[1]===1){
      state.expValue=d[2];
      render();
    }
  }
}

function toggleStomp(i){
  state.stomps[i].on=!state.stomps[i].on;
  const fx=state.effects.find(e=>e.name===state.stomps[i].name);
  state.effects.forEach(e=>e.selected=false);
  if(fx){
    fx.on=state.stomps[i].on;
    fx.selected=true;
  }
  render();
}

render();
</script>
</body>
</html>
