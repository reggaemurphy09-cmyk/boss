<!DOCTYPE html>
<html>
<body>
<button onclick="test()">Test ME-90</button>
<pre id="log"></pre>

<script>
let device;
const log = msg => document.getElementById("log").textContent += msg + "\n";

async function test() {
  try {
    device = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0582, productId: 0x02e0 }]
    });

    await device.open();
    log("Device Opened");

    if (!device.configuration) {
      await device.selectConfiguration(1);
      log("Configuration selected");
    }

    await device.claimInterface(5);
    log("Interface 5 Claimed");

    // Test bulk send to endpoint 3
    const data = new Uint8Array([0xC0, 0x00]); // MIDI Program Change test
    await device.transferOut(3, data);

    log("Data sent to endpoint 3");

  } catch (e) {
    log("ERROR: " + e.message);
  }
}
</script>
</body>
</html>
