<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ME-90 Interface Claim Tester</title>
<style>
body{
  font-family:Arial,sans-serif;
  padding:20px;
}
button{
  padding:12px;
  font-size:16px;
}
pre{
  white-space:pre-wrap;
  border:1px solid #ccc;
  padding:10px;
  margin-top:20px;
}
</style>
</head>
<body>

<h2>Boss ME-90 Interface Tester</h2>

<button onclick="test()">Connect ME-90</button>

<pre id="log">Ready...</pre>

<script>
async function test() {

  const log = document.getElementById("log");

  try {

    const device = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0582 }]
    });

    log.textContent = "Connected: " + device.productName;

    await device.open();

    log.textContent += "\nUSB Opened Successfully";

    if (!device.configuration) {
      await device.selectConfiguration(1);
    }

    log.textContent += "\nConfiguration Selected\n";

    for (const iface of device.configuration.interfaces) {

      log.textContent +=
        "\nTesting Interface " +
        iface.interfaceNumber;

      try {

        await device.claimInterface(
          iface.interfaceNumber
        );

        log.textContent +=
          "\n  SUCCESS";

        await device.releaseInterface(
          iface.interfaceNumber
        );

      } catch (err) {

        log.textContent +=
          "\n  FAILED: " +
          err.message;
      }
    }

  } catch (e) {

    log.textContent +=
      "\nERROR:\n" + e.message;
  }
}
</script>

</body>
</html>
