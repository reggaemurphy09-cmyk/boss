<!DOCTYPE html>
<html>
<head>
    <title>ME-90 USB Test</title>
</head>
<body>

    <h2>Boss ME-90 USB Test</h2>

    <button onclick="connect()">Connect ME-90</button>

    <pre id="log">Waiting...</pre>

<script>
async function connect() {

    const log = document.getElementById('log');

    try {

        const device = await navigator.usb.requestDevice({
            filters: [{ vendorId: 0x0582 }]
        });

        log.textContent =
            "Connected: " + device.productName;

        await device.open();

        log.textContent +=
            "\nUSB Opened Successfully";

        if (device.configuration === null) {
            await device.selectConfiguration(1);
        }

        log.textContent +=
            "\nConfiguration Selected";

        await device.claimInterface(3);

        log.textContent +=
            "\nInterface 3 Claimed Successfully";

    }
    catch (e) {

        log.textContent +=
            "\nERROR: " + e.message;
    }
}
</script>

</body>
</html>
