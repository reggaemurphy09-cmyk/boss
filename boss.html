<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 USB Sniffer</title>
<style>
body{background:#101214;color:white;font-family:Arial;padding:16px}
.card{background:#1b1f24;border:1px solid #333;border-radius:18px;padding:16px;max-width:480px;margin:auto}
button{width:100%;padding:16px;margin:8px 0;border-radius:14px;border:1px solid #444;background:#243447;color:white;font-size:16px}
.status{padding:12px;background:#111;border-radius:12px;margin:10px 0}
.log{background:#050505;color:#9ae6b4;padding:10px;height:360px;overflow:auto;font-family:monospace;font-size:12px;white-space:pre-wrap;border-radius:12px}
</style>
</head>
<body>
<div class="card">
  <h2>🎛️ ME-90 USB Sniffer</h2>
  <button onclick="connectUSB()">🔌 CONNECT USB</button>
  <button onclick="stopListen()">⛔ STOP</button>
  <button onclick="clearLog()">🗑 CLEAR</button>
  <div class="status" id="status">Not connected</div>
  <div class="log" id="log">Connect ME-90, then press pedal...</div>
</div>

<script>
const BOSS_VID = 0x0582;
const ME90_PID = 0x02e0;

let device = null;
let inEndpoint = null;
let outEndpoint = null;
let ifaceNumber = null;
let running = false;

const statusBox = document.getElementById("status");
const logBox = document.getElementById("log");

function log(msg){
  const t = new Date().toLocaleTimeString();
  logBox.textContent = `[${t}] ${msg}\n` + logBox.textContent;
}

function clearLog(){ logBox.textContent = ""; }

function hex(data){
  return Array.from(data)
    .map(b => b.toString(16).padStart(2,"0").toUpperCase())
    .join(" ");
}

async function connectUSB(){
  try{
    if(!navigator.usb){
      statusBox.textContent = "WebUSB not supported. Use Chrome Android.";
      log("❌ WebUSB not supported");
      return;
    }

    log("🔍 Requesting ME-90...");
    device = await navigator.usb.requestDevice({
      filters:[{ vendorId:BOSS_VID, productId:ME90_PID }]
    });

    log("✅ Found: " + (device.productName || "BOSS ME-90"));

    await device.open();
    log("✅ Device opened");

    if(device.configuration === null){
      await device.selectConfiguration(1);
      log("✅ Configuration selected");
    }

    scanEndpoints();

    if(ifaceNumber === null || inEndpoint === null){
      statusBox.textContent = "No IN endpoint found";
      log("❌ No IN endpoint found");
      return;
    }

    try{
      await device.claimInterface(ifaceNumber);
      log("✅ Claimed interface #" + ifaceNumber);
    }catch(e){
      log("⚠️ Claim error: " + e.message);
    }

    statusBox.textContent =
      "Connected | Interface #" + ifaceNumber +
      " | IN " + inEndpoint +
      " | OUT " + (outEndpoint ?? "none");

    running = true;
    listenLoop();

  }catch(err){
    statusBox.textContent = "Error: " + err.message;
    log("❌ " + err.message);
  }
}

function scanEndpoints(){
  inEndpoint = null;
  outEndpoint = null;
  ifaceNumber = null;

  const config = device.configuration || device.configurations[0];

  log("🔎 Scanning interfaces...");

  for(const iface of config.interfaces){
    for(const alt of iface.alternates){
      log("Interface " + iface.interfaceNumber +
          " alt " + alt.alternateSetting +
          " class " + alt.interfaceClass);

      for(const ep of alt.endpoints){
        log("  endpoint " + ep.endpointNumber +
            " " + ep.direction +
            " " + ep.type +
            " packet " + ep.packetSize);

        if(ep.direction === "in" && inEndpoint === null){
          inEndpoint = ep.endpointNumber;
          ifaceNumber = iface.interfaceNumber;
        }

        if(ep.direction === "out" && outEndpoint === null){
          outEndpoint = ep.endpointNumber;
        }
      }
    }
  }
}

async function listenLoop(){
  log("👂 Listening for incoming USB packets...");
  log("Now press ME-90 pedal.");

  while(running && device && inEndpoint !== null){
    try{
      const result = await device.transferIn(inEndpoint, 64);

      if(result.status === "ok" && result.data){
        const bytes = new Uint8Array(result.data.buffer);
        log("📥 IN: " + hex(bytes));
      }else{
        log("⚠️ IN status: " + result.status);
      }

    }catch(e){
      log("❌ Read error: " + e.message);
      running = false;
      break;
    }
  }
}

function stopListen(){
  running = false;
  log("⛔ Stopped listening");
}
</script>
</body>
</html>
