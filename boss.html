<!DOCTYPE html>
<html>
<body>

<button onclick="test()">Test ME-90</button>

<pre id="log"></pre>

<script>
async function test() {

  const log = document.getElementById("log");

  try {

    const device = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0582 }]
    });

    await device.open();

    if (!device.configuration) {
      await device.selectConfiguration(1);
    }

    log.textContent = "Device Opened\n";

    try {

      await device.selectAlternateInterface(3, 1);

      log.textContent +=
        "Alternate Interface 3:1 Selected\n";

    } catch (e) {

      log.textContent +=
        "Alternate Select Failed:\n" +
        e.message + "\n";
    }

    try {

      await device.claimInterface(3);

      log.textContent +=
        "Interface 3 Claimed\n";

    } catch (e) {

      log.textContent +=
        "Claim Failed:\n" +
        e.message + "\n";
    }

  } catch (e) {

    log.textContent +=
      "Error:\n" + e.message;
  }
}
</script>

</body>
</html>
