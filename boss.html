<button onclick="scan()">Scan ME-90</button>
<pre id="log"></pre>

<script>
const log = m => document.getElementById("log").textContent += m + "\n";

async function scan() {
  const device = await navigator.usb.requestDevice({
    filters: [{ vendorId: 0x0582, productId: 0x02e0 }]
  });

  await device.open();
  log("Opened");

  for (const config of device.configurations) {
    log("\nCONFIG " + config.configurationValue);

    for (const iface of config.interfaces) {
      log(
        "Interface number: " + iface.interfaceNumber +
        " | Alternate: " + iface.alternates.length
      );

      for (const alt of iface.alternates) {
        log("  Alt " + alt.alternateSetting +
            " endpoints: " + alt.endpoints.length);
      }
    }
  }
}
</script>
