<!DOCTYPE html>
<html>
<body>
<button onclick="test()">Test</button>
<pre id="log"></pre>

<script>
async function test() {

const log = document.getElementById("log");

const device = await navigator.usb.requestDevice({
filters:[{vendorId:0x0582}]
});

await device.open();

if(!device.configuration){
await device.selectConfiguration(1);
}

log.textContent="";

for(const iface of device.configuration.interfaces){

log.textContent +=
"\nINTERFACE " + iface.interfaceNumber + "\n";

for(const alt of iface.alternates){

log.textContent +=
" Alternate: " + alt.alternateSetting + "\n";

log.textContent +=
" Class: " + alt.interfaceClass + "\n";

log.textContent +=
" Subclass: " + alt.interfaceSubclass + "\n";

log.textContent +=
" Protocol: " + alt.interfaceProtocol + "\n";

for(const ep of alt.endpoints){

log.textContent +=
" Endpoint " +
ep.endpointNumber +
" " +
ep.direction +
"\n";
}
}
}
}
</script>
</body>
</html>
