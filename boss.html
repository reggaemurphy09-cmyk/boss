<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BOSS ME-90 · Android Controller</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d0f11;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
      color: #e8edf2;
      touch-action: manipulation;
    }

    .app {
      max-width: 500px;
      width: 100%;
      background: #1a1e22;
      border-radius: 32px;
      padding: 20px 16px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
      border: 1px solid #2a2f35;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 1px solid #282d33;
      margin-bottom: 18px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 small {
      font-size: 12px;
      font-weight: 400;
      color: #7a838c;
      background: #242a30;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .connect-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8a939d;
    }

    .led-status {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3a4149;
      transition: 0.2s;
    }

    .led-status.connected {
      background: #22c55e;
      box-shadow: 0 0 12px #22c55e66;
    }

    .led-status.error {
      background: #ef4444;
      box-shadow: 0 0 12px #ef444466;
    }

    .section {
      background: #14181c;
      border-radius: 24px;
      padding: 14px 14px 18px;
      margin-bottom: 16px;
      border: 1px solid #262c32;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #7e8892;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bank-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .bank-btn {
      background: #1f242a;
      border: 1px solid #313840;
      border-radius: 40px;
      padding: 14px 0;
      font-weight: 700;
      font-size: 16px;
      color: #aab3bd;
      transition: all 0.08s;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: inset 0 -3px 0 #0d1013;
    }

    .bank-btn:active {
      transform: scale(0.92);
      box-shadow: inset 0 -1px 0 #0d1013;
    }

    .bank-btn.active {
      background: #3b82f6;
      border-color: #60a5fa;
      color: white;
      box-shadow: inset 0 -3px 0 #1d4ed8, 0 0 20px #3b82f640;
    }

    .fx-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .fx-toggle {
      background: #1a1f24;
      border: 1px solid #2d333a;
      border-radius: 30px;
      padding: 12px 6px;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: #9aa4ae;
      transition: 0.08s;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
    }

    .fx-toggle:active {
      transform: scale(0.94);
    }

    .fx-toggle.on {
      background: #1a3d66;
      border-color: #3b82f6;
      color: white;
      box-shadow: inset 0 0 0 1px #3b82f6;
    }

    .fx-toggle .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3a4149;
      margin-right: 6px;
      transition: 0.1s;
    }

    .fx-toggle.on .dot {
      background: #60a5fa;
      box-shadow: 0 0 12px #3b82f6;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .slider-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-item label {
      width: 50px;
      font-size: 13px;
      font-weight: 500;
      color: #9aa4ae;
    }

    .slider-item input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #252b32;
      border-radius: 10px;
      outline: none;
      border: 1px solid #31383f;
    }

    .slider-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: #c8d2dd;
      border-radius: 50%;
      cursor: pointer;
      border: 1px solid #5a6672;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }

    .slider-item input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(0.9);
    }

    .slider-value {
      min-width: 32px;
      text-align: right;
      font-weight: 600;
      color: #bcc6d0;
      font-size: 14px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 4px;
    }

    .action-btn {
      background: #1f242a;
      border: 1px solid #313840;
      border-radius: 40px;
      padding: 14px 8px;
      font-weight: 600;
      font-size: 13px;
      color: #c8d2dd;
      transition: 0.06s;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: inset 0 -3px 0 #0d1013;
    }

    .action-btn:active {
      transform: scale(0.92);
      box-shadow: inset 0 -1px 0 #0d1013;
    }

    .action-btn.primary {
      background: #2a4b74;
      border-color: #3b82f6;
      color: white;
      box-shadow: inset 0 -3px 0 #1a365d;
    }

    .log-area {
      background: #0d1013;
      border-radius: 16px;
      padding: 10px 14px;
      margin-top: 12px;
      font-size: 11px;
      color: #6b757f;
      font-family: monospace;
      min-height: 40px;
      border: 1px solid #21262c;
      max-height: 60px;
      overflow-y: auto;
      word-break: break-all;
    }

    .footer {
      font-size: 10px;
      text-align: center;
      color: #4d5660;
      margin-top: 16px;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎛️ ME-90 <small>Android</small></h1>
    <div class="connect-status">
      <span id="connectText">disconnected</span>
      <span class="led-status" id="statusLed"></span>
    </div>
  </div>

  <!-- Bank -->
  <div class="section">
    <div class="section-title">📁 Bank</div>
    <div class="bank-grid">
      <button class="bank-btn" data-bank="0">1</button>
      <button class="bank-btn" data-bank="1">2</button>
      <button class="bank-btn" data-bank="2">3</button>
      <button class="bank-btn" data-bank="3">4</button>
      <button class="bank-btn" data-bank="4">5</button>
    </div>
  </div>

  <!-- FX -->
  <div class="section">
    <div class="section-title">🎚️ Effects</div>
    <div class="fx-grid">
      <div class="fx-toggle" data-fx="od"><span class="dot"></span>OD</div>
      <div class="fx-toggle" data-fx="ds"><span class="dot"></span>DS</div>
      <div class="fx-toggle" data-fx="mod"><span class="dot"></span>MOD</div>
      <div class="fx-toggle" data-fx="delay"><span class="dot"></span>DELAY</div>
      <div class="fx-toggle" data-fx="reverb"><span class="dot"></span>REVERB</div>
      <div class="fx-toggle" data-fx="chorus"><span class="dot"></span>CHORUS</div>
    </div>
  </div>

  <!-- Parameters -->
  <div class="section">
    <div class="section-title">🎛️ Parameters</div>
    <div class="slider-group">
      <div class="slider-item">
        <label>GAIN</label>
        <input type="range" min="0" max="127" value="60" id="param-gain">
        <span class="slider-value" id="val-gain">60</span>
      </div>
      <div class="slider-item">
        <label>TONE</label>
        <input type="range" min="0" max="127" value="64" id="param-tone">
        <span class="slider-value" id="val-tone">64</span>
      </div>
      <div class="slider-item">
        <label>LEVEL</label>
        <input type="range" min="0" max="127" value="80" id="param-level">
        <span class="slider-value" id="val-level">80</span>
      </div>
      <div class="slider-item">
        <label>TIME</label>
        <input type="range" min="0" max="127" value="50" id="param-time">
        <span class="slider-value" id="val-time">50</span>
      </div>
      <div class="slider-item">
        <label>DEPTH</label>
        <input type="range" min="0" max="127" value="40" id="param-depth">
        <span class="slider-value" id="val-depth">40</span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn" id="btnTap">⏱ TAP</button>
    <button class="action-btn primary" id="btnSave">💾 SAVE</button>
    <button class="action-btn" id="btnReset">↺ RESET</button>
  </div>

  <!-- Log -->
  <div class="log-area" id="logArea">🔌 Waiting for MIDI connection...</div>

  <div class="footer">BOSS ME-90 · USB MIDI · Chrome on Android</div>
</div>

<script>
  (function(){
    'use strict';

    // ----- STATE -----
    const state = {
      bank: 0,
      fx: { od: false, ds: false, mod: false, delay: false, reverb: false, chorus: false },
      params: { gain: 60, tone: 64, level: 80, time: 50, depth: 40 }
    };

    let midiOutput = null;
    let midiInput = null;
    let isConnected = false;

    // ----- MIDI CC MAP (BOSS ME-90) -----
    const CC = {
      GAIN: 1,
      TONE: 2,
      LEVEL: 3,
      TIME: 4,
      DEPTH: 5,
      OD: 16,
      DS: 17,
      MOD: 18,
      DELAY: 19,
      REVERB: 20,
      CHORUS: 21,
      TAP: 64
    };

    // ----- DOM REFS -----
    const bankBtns = document.querySelectorAll('.bank-btn');
    const fxToggles = document.querySelectorAll('.fx-toggle');
    const sliders = {
      gain: document.getElementById('param-gain'),
      tone: document.getElementById('param-tone'),
      level: document.getElementById('param-level'),
      time: document.getElementById('param-time'),
      depth: document.getElementById('param-depth')
    };
    const valLabels = {
      gain: document.getElementById('val-gain'),
      tone: document.getElementById('val-tone'),
      level: document.getElementById('val-level'),
      time: document.getElementById('val-time'),
      depth: document.getElementById('val-depth')
    };
    const logArea = document.getElementById('logArea');
    const statusLed = document.getElementById('statusLed');
    const connectText = document.getElementById('connectText');

    // ----- LOGGING -----
    function log(msg) {
      logArea.textContent = msg;
      console.log('[ME-90]', msg);
    }

    // ----- SEND MIDI -----
    function sendMIDI(data) {
      if (!midiOutput) {
        log('❌ No MIDI output available');
        return false;
      }
      try {
        midiOutput.send(data);
        return true;
      } catch(e) {
        log('❌ MIDI send error: ' + e.message);
        return false;
      }
    }

    function sendCC(channel, cc, value) {
      // channel 0 = MIDI channel 1
      const status = 0xB0 | (channel & 0x0F);
      const msg = [status, cc, Math.min(127, Math.max(0, value))];
      sendMIDI(msg);
      return msg;
    }

    function sendPC(channel, program) {
      const status = 0xC0 | (channel & 0x0F);
      const msg = [status, Math.min(127, Math.max(0, program))];
      sendMIDI(msg);
      return msg;
    }

    // ----- UI UPDATES -----
    function updateFXUI() {
      fxToggles.forEach(el => {
        const fx = el.dataset.fx;
        if (state.fx[fx]) {
          el.classList.add('on');
        } else {
          el.classList.remove('on');
        }
      });
    }

    function updateBankUI() {
      bankBtns.forEach((btn, idx) => {
        btn.classList.toggle('active', idx === state.bank);
      });
    }

    function updateSliderUI() {
      const names = ['gain', 'tone', 'level', 'time', 'depth'];
      names.forEach(name => {
        const val = state.params[name];
        sliders[name].value = val;
        valLabels[name].textContent = val;
      });
    }

    // ----- SEND STATE TO ME-90 -----
    function sendAllState() {
      if (!midiOutput) {
        log('⚠️ Not connected, cannot send');
        return;
      }

      // Send bank (Program Change)
      sendPC(0, state.bank);
      log(`📁 Bank ${state.bank + 1} → PC #${state.bank}`);

      // Send FX states
      const fxMap = {
        od: CC.OD,
        ds: CC.DS,
        mod: CC.MOD,
        delay: CC.DELAY,
        reverb: CC.REVERB,
        chorus: CC.CHORUS
      };
      Object.keys(fxMap).forEach(fx => {
        const val = state.fx[fx] ? 127 : 0;
        sendCC(0, fxMap[fx], val);
        log(`🎚️ ${fx.toUpperCase()} → ${val > 0 ? 'ON' : 'OFF'}`);
      });

      // Send parameters
      const paramMap = {
        gain: CC.GAIN,
        tone: CC.TONE,
        level: CC.LEVEL,
        time: CC.TIME,
        depth: CC.DEPTH
      };
      Object.keys(paramMap).forEach(param => {
        const val = state.params[param];
        sendCC(0, paramMap[param], val);
        log(`🎛️ ${param.toUpperCase()} → ${val}`);
      });

      log('✅ All state sent');
    }

    // ----- CONNECT MIDI -----
    async function connectMIDI() {
      try {
        if (!navigator.requestMIDIAccess) {
          log('❌ Web MIDI not supported. Use Chrome on Android.');
          statusLed.className = 'led-status error';
          connectText.textContent = 'not supported';
          return;
        }

        const access = await navigator.requestMIDIAccess({ sysex: false });
        log('🔌 MIDI access granted');

        const outputs = access.outputs;
        const inputs = access.inputs;

        // Find ME-90
        let foundOutput = null;
        let foundInput = null;

        // Log all outputs
        outputs.forEach((output, key) => {
          log(`Output: ${output.name} (${key})`);
          if (output.name && (output.name.includes('ME-90') || output.name.includes('BOSS'))) {
            foundOutput = output;
          }
        });

        inputs.forEach((input, key) => {
          log(`Input: ${input.name} (${key})`);
          if (input.name && (input.name.includes('ME-90') || input.name.includes('BOSS'))) {
            foundInput = input;
          }
        });

        // If not found by name, take first available
        if (!foundOutput && outputs.size > 0) {
          foundOutput = outputs.values().next().value;
          log('⚠️ Using first available output');
        }

        if (foundOutput) {
          midiOutput = foundOutput;
          isConnected = true;
          statusLed.className = 'led-status connected';
          connectText.textContent = 'connected ✅';
          log(`✅ Connected to: ${foundOutput.name || 'ME-90'}`);

          // Send current state
          setTimeout(sendAllState, 200);
        } else {
          statusLed.className = 'led-status error';
          connectText.textContent = 'no device';
          log('❌ No ME-90 output found. Check USB connection.');
        }

        // Listen for MIDI input (for feedback)
        if (foundInput) {
          midiInput = foundInput;
          midiInput.onmidimessage = (event) => {
            const data = event.data;
            log(`📥 MIDI in: [${data.join(', ')}]`);
          };
        }

      } catch (err) {
        log('❌ MIDI error: ' + err.message);
        statusLed.className = 'led-status error';
        connectText.textContent = 'error';
      }
    }

    // ----- INIT UI EVENTS -----
    function initUI() {
      // Bank buttons
      bankBtns.forEach((btn, idx) => {
        btn.addEventListener('click', () => {
          state.bank = idx;
          updateBankUI();
          sendPC(0, idx);
          log(`📁 Bank ${idx + 1}`);
        });
        btn.addEventListener('touchend', (e) => {
          e.preventDefault();
          btn.click();
        });
      });

      // FX toggles
      fxToggles.forEach(el => {
        const fx = el.dataset.fx;
        el.addEventListener('click', () => {
          state.fx[fx] = !state.fx[fx];
          updateFXUI();
          const val = state.fx[fx] ? 127 : 0;
          const cc = CC[fx.toUpperCase()];
          if (cc) {
            sendCC(0, cc, val);
            log(`🎚️ ${fx.toUpperCase()} ${state.fx[fx] ? 'ON' : 'OFF'}`);
          }
        });
        el.addEventListener('touchend', (e) => {
          e.preventDefault();
          el.click();
        });
      });

      // Sliders
      const paramNames = ['gain', 'tone', 'level', 'time', 'depth'];
      paramNames.forEach(name => {
        const slider = sliders[name];
        const label = valLabels[name];
        const cc = CC[name.toUpperCase()];

        slider.addEventListener('input', () => {
          const val = parseInt(slider.value);
          state.params[name] = val;
          label.textContent = val;
          if (cc) {
            sendCC(0, cc, val);
          }
        });

        slider.addEventListener('touchstart', () => {
          // prevent page scroll
        }, { passive: true });
      });

      // Actions
      document.getElementById('btnTap').addEventListener('click', () => {
        sendCC(0, CC.TAP, 127);
        setTimeout(() => sendCC(0, CC.TAP, 0), 20);
        log('⏱ TAP');
      });

      document.getElementById('btnSave').addEventListener('click', () => {
        // ME-90: CC #80 = write
        sendCC(0, 80, 127);
        setTimeout(() => sendCC(0, 80, 0), 20);
        log('💾 Save patch');
      });

      document.getElementById('btnReset').addEventListener('click', () => {
        // Reset state but keep connection
        state.bank = 0;
        state.fx = { od: false, ds: false, mod: false, delay: false, reverb: false, chorus: false };
        state.params = { gain: 60, tone: 64, level: 80, time: 50, depth: 40 };
        updateBankUI();
        updateFXUI();
        updateSliderUI();
        sendAllState();
        log('↺ Reset');
      });
    }

    // ----- START -----
    function init() {
      initUI();
      // Auto-connect after 500ms
      setTimeout(connectMIDI, 500);

      // Reconnect button: click on status
      document.querySelector('.connect-status').addEventListener('click', () => {
        connectMIDI();
      });
    }

    // Run when ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
</script>
</body>
</html>
