<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 Patch Receiver</title>
<style>
body{background:#101214;color:white;font-family:Arial;padding:16px}
.card{background:#1b1f24;border:1px solid #333;border-radius:18px;padding:16px;max-width:500px;margin:auto}
button,select,input{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:1px solid #444;background:#243447;color:white;font-size:16px}
.status{background:#111;padding:12px;border-radius:12px;margin:10px 0}
.patch{font-size:70px;text-align:center;color:#22c55e;font-weight:bold}
.log{background:#050505;color:#9ae6b4;padding:10px;height:260px;overflow:auto;font-family:monospace;font-size:12px;white-space:pre-wrap;border-radius:12px}
</style>
</head>
<body>

<div class="card">
  <h2>🎛️ ME-90 Patch Receiver</h2>

  <button onclick="connectMIDI()">🔌 CONNECT MIDI</button>
  <select id="inputSelect"></select>

  <div class="status" id="status">Not connected</div>

  <div>Current Patch</div>
  <div class="patch" id="patch">--</div>

  <button onclick="clearLog()">🗑 Clear</button>

  <input id="manualHex" placeholder="Paste hex like: 1C C0 45 60">
  <button onclick="testManual()">🧪 Decode Manual Hex</button>

  <div class="log" id="log">Connect ME-90 then press pedal...</div>
</div>

<script>
let midiAccess = null;
let currentInput = null;

const statusBox = document.getElementById("status");
const patchBox = document.getElementById("patch");
const logBox = document.getElementById("log");
const inputSelect = document.getElementById("inputSelect");

function log(msg){
  const t = new Date().toLocaleTimeString();
  logBox.textContent = `[${t}] ${msg}\n` + logBox.textContent;
}

function clearLog(){
  logBox.textContent = "";
}

async function connectMIDI(){
  try{
    if(!navigator.requestMIDIAccess){
      statusBox.textContent = "Web MIDI not supported.";
      log("❌ Web MIDI not supported.");
      return;
    }

    log("🔍 Requesting MIDI access...");
    midiAccess = await navigator.requestMIDIAccess({sysex:true});

    log("✅ MIDI access granted");
    refreshInputs();

    midiAccess.onstatechange = refreshInputs;

  }catch(e){
    statusBox.textContent = "Error: " + e.message;
    log("❌ " + e.message);
  }
}

function refreshInputs(){
  inputSelect.innerHTML = "";

  const inputs = Array.from(midiAccess.inputs.values());

  if(inputs.length === 0){
    statusBox.textContent = "No MIDI input found";
    log("❌ No MIDI input found");
    return;
  }

  inputs.forEach(input=>{
    const opt = document.createElement("option");
    opt.value = input.id;
    opt.textContent = input.name;
    inputSelect.appendChild(opt);
    log("🎹 Found: " + input.name);
  });

  const preferred = inputs.find(i=>/me-?90|boss/i.test(i.name)) || inputs[0];
  inputSelect.value = preferred.id;
  attachInput(preferred);
}

function attachInput(input){
  if(currentInput) currentInput.onmidimessage = null;

  currentInput = input;
  currentInput.onmidimessage = handleMIDI;

  statusBox.textContent = "Listening: " + input.name;
  log("✅ Listening on " + input.name);
}

inputSelect.addEventListener("change", ()=>{
  const inputs = Array.from(midiAccess.inputs.values());
  const selected = inputs.find(i=>i.id === inputSelect.value);
  if(selected) attachInput(selected);
});

function handleMIDI(event){
  const data = Array.from(event.data);
  decodePacket(data, "LIVE");
}

function decodePacket(data, source){
  const hex = data.map(b=>b.toString(16).padStart(2,"0").toUpperCase()).join(" ");

  log(`📥 ${source}: ${hex}`);

  let status, program;

  if(data.length === 4 && (data[0] & 0x0F) === 0x0C){
    status = data[1];
    program = data[2];
  } else {
    status = data[0];
    program = data[1];
  }

  const type = status & 0xF0;
  const channel = (status & 0x0F) + 1;

  if(type === 0xC0){
    const displayPatch = program + 1;
    patchBox.textContent = displayPatch;
    log(`✅ Program Change | Raw ${program} | Display Patch ${displayPatch} | Channel ${channel}`);
  } else if(type === 0xB0){
    log(`🎚️ Control Change CC ${program} = ${data[2]}`);
  } else {
    log("📩 Other MIDI message");
  }
}

function testManual(){
  const text = document.getElementById("manualHex").value.trim();
  if(!text) return;

  const data = text.split(/\s+/).map(x=>parseInt(x,16)).filter(x=>!isNaN(x));
  decodePacket(data, "MANUAL");
}
</script>

</body>
</html>
