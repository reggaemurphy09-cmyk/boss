<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>ME-90 · MIDI + WebUSB Hybrid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f11;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 12px;
      color: #e8edf2;
      touch-action: manipulation;
    }
    .app {
      max-width: 500px;
      margin: 0 auto;
      background: #1a1e22;
      border-radius: 28px;
      padding: 20px 16px;
      border: 1px solid #2a2f35;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 14px;
      border-bottom: 1px solid #282d33;
      margin-bottom: 16px;
    }
    .header h1 { font-size: 20px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .led {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3a4149;
      transition: 0.2s;
    }
    .led.on { background: #22c55e; box-shadow: 0 0 12px #22c55e66; }
    .led.error { background: #ef4444; box-shadow: 0 0 12px #ef444466; }
    .led.warning { background: #f59e0b; box-shadow: 0 0 12px #f59e0b66; animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .section {
      background: #14181c;
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 14px;
      border: 1px solid #262c32;
    }
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      color: #7e8892;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    .btn-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
    .btn-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .btn {
      background: #1f242a;
      border: 1px solid #313840;
      border-radius: 30px;
      padding: 14px 6px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
      color: #aab3bd;
      cursor: pointer;
      touch-action: manipulation;
      box-shadow: inset 0 -3px 0 #0d1013;
      transition: all 0.06s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.92); }
    .btn.active { background: #3b82f6; border-color: #60a5fa; color: white; box-shadow: inset 0 -3px 0 #1d4ed8; }
    .btn.on { background: #1a3d66; border-color: #3b82f6; color: white; box-shadow: inset 0 -3px 0 #0d2a4a; }
    .btn.primary { background: #2a4b74; border-color: #3b82f6; color: white; box-shadow: inset 0 -3px 0 #1a365d; }
    .btn-danger { background: #742a2a; border-color: #f63b3b; color: white; box-shadow: inset 0 -3px 0 #5a1a1a; }
    .btn-success { background: #1a4b2a; border-color: #22c55e; color: white; box-shadow: inset 0 -3px 0 #0d331a; }
    .slider-group { display: flex; flex-direction: column; gap: 12px; }
    .slider-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-item label { width: 48px; font-size: 12px; color: #9aa4ae; }
    .slider-item input[type="range"] {
      flex: 1;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #252b32;
      border-radius: 10px;
      outline: none;
      border: 1px solid #31383f;
    }
    .slider-item input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: #c8d2dd;
      border-radius: 50%;
      cursor: pointer;
      border: 1px solid #5a6672;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
    }
    .slider-value { min-width: 30px; text-align: right; font-weight: 600; font-size: 13px; color: #bcc6d0; }
    .log {
      background: #0d1013;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 11px;
      font-family: monospace;
      color: #6b757f;
      border: 1px solid #21262c;
      min-height: 80px;
      margin-top: 8px;
      word-break: break-all;
      max-height: 150px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    .info-box {
      background: #0d1013;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      color: #8a939d;
      border: 1px solid #21262c;
      margin-bottom: 12px;
    }
    .info-box strong { color: #bcc6d0; }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-row .btn { padding: 10px; font-size: 12px; }
    .status-msg {
      color: #f59e0b;
      font-size: 11px;
      margin-top: 4px;
    }
    .mode-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mode-selector .btn {
      flex: 1;
      padding: 8px;
      font-size: 11px;
    }
    .mode-selector .btn.active { background: #2a4b74; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎛️ ME-90 <span style="font-size:12px;color:#7e8892;">hybrid</span></h1>
    <div class="status">
      <span id="statusText">offline</span>
      <span class="led" id="statusLed"></span>
    </div>
  </div>

  <!-- Mode selector -->
  <div class="section" style="padding: 10px;">
    <div class="mode-selector">
      <button class="btn active" id="modeWebUSB">🔌 WebUSB</button>
      <button class="btn" id="modeWebMIDI">🎹 WebMIDI</button>
    </div>
    <button class="btn-success" id="btnConnect" style="width:100%;padding:14px;font-size:16px;border-radius:30px;border:1px solid #22c55e66;cursor:pointer;font-weight:600;">
      🔌 CONNECT
    </button>
    <div class="info-box" style="margin-top: 10px;">
      <strong>Mode:</strong> <span id="currentMode">WebUSB</span><br>
      <strong>Status:</strong> <span id="statusMsg">Tap CONNECT to pair</span>
    </div>
  </div>

  <!-- Bank -->
  <div class="section">
    <div class="section-title">📁 Bank</div>
    <div class="btn-grid">
      <button class="btn" data-bank="0">1</button>
      <button class="btn" data-bank="1">2</button>
      <button class="btn" data-bank="2">3</button>
      <button class="btn" data-bank="3">4</button>
      <button class="btn" data-bank="4">5</button>
    </div>
  </div>

  <!-- FX -->
  <div class="section">
    <div class="section-title">🎚️ Effects</div>
    <div class="btn-grid-3">
      <button class="btn" data-fx="od">OD</button>
      <button class="btn" data-fx="ds">DS</button>
      <button class="btn" data-fx="mod">MOD</button>
      <button class="btn" data-fx="delay">DELAY</button>
      <button class="btn" data-fx="reverb">REVERB</button>
      <button class="btn" data-fx="chorus">CHORUS</button>
    </div>
  </div>

  <!-- Params -->
  <div class="section">
    <div class="section-title">🎛️ Parameters</div>
    <div class="slider-group">
      <div class="slider-item"><label>GAIN</label><input type="range" min="0" max="127" value="60" id="param-gain"><span class="slider-value" id="val-gain">60</span></div>
      <div class="slider-item"><label>TONE</label><input type="range" min="0" max="127" value="64" id="param-tone"><span class="slider-value" id="val-tone">64</span></div>
      <div class="slider-item"><label>LEVEL</label><input type="range" min="0" max="127" value="80" id="param-level"><span class="slider-value" id="val-level">80</span></div>
      <div class="slider-item"><label>TIME</label><input type="range" min="0" max="127" value="50" id="param-time"><span class="slider-value" id="val-time">50</span></div>
      <div class="slider-item"><label>DEPTH</label><input type="range" min="0" max="127" value="40" id="param-depth"><span class="slider-value" id="val-depth">40</span></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn" id="btnTap">⏱ TAP</button>
    <button class="btn primary" id="btnSave">💾 SAVE</button>
  </div>
  <div class="btn-row">
    <button class="btn" id="btnTest">🔬 TEST MIDI</button>
    <button class="btn btn-danger" id="btnReset">↺ RESET</button>
  </div>

  <div class="log" id="logArea">🔍 Choose mode, then tap CONNECT</div>
</div>

<script>
  (function() {
    'use strict';

    // ----- STATE -----
    const state = {
      bank: 0,
      fx: { od: false, ds: false, mod: false, delay: false, reverb: false, chorus: false },
      params: { gain: 60, tone: 64, level: 80, time: 50, depth: 40 }
    };

    let currentMode = 'webusb'; // or 'webmidi'
    let midiOutput = null;
    let usbDevice = null;
    let usbEndpointOut = null;

    // ----- CC MAP -----
    const CC = {
      GAIN: 1, TONE: 2, LEVEL: 3, TIME: 4, DEPTH: 5,
      OD: 16, DS: 17, MOD: 18, DELAY: 19, REVERB: 20, CHORUS: 21,
      TAP: 64
    };

    // ----- DOM -----
    const logArea = document.getElementById('logArea');
    const statusText = document.getElementById('statusText');
    const statusLed = document.getElementById('statusLed');
    const statusMsg = document.getElementById('statusMsg');
    const currentModeDisplay = document.getElementById('currentMode');
    const bankBtns = document.querySelectorAll('[data-bank]');
    const fxBtns = document.querySelectorAll('[data-fx]');
    const sliders = {
      gain: document.getElementById('param-gain'),
      tone: document.getElementById('param-tone'),
      level: document.getElementById('param-level'),
      time: document.getElementById('param-time'),
      depth: document.getElementById('param-depth')
    };
    const valLabels = {
      gain: document.getElementById('val-gain'),
      tone: document.getElementById('val-tone'),
      level: document.getElementById('val-level'),
      time: document.getElementById('val-time'),
      depth: document.getElementById('val-depth')
    };

    // ----- LOG -----
    function log(msg) {
      const time = new Date().toLocaleTimeString();
      const entry = `[${time}] ${msg}`;
      logArea.textContent = entry + '\n' + logArea.textContent.split('\n').slice(0, 30).join('\n');
      console.log('[ME-90]', msg);
    }

    // ----- SEND FUNCTIONS -----
    async function sendMIDI(data) {
      if (currentMode === 'webmidi' && midiOutput) {
        try {
          midiOutput.send(data);
          const hex = data.map(b => '0x' + b.toString(16).padStart(2, '0')).join(' ');
          log(`📤 MIDI: [${hex}]`);
          return true;
        } catch(e) {
          log(`❌ MIDI error: ${e.message}`);
          return false;
        }
      } else if (currentMode === 'webusb' && usbDevice && usbEndpointOut !== null) {
        try {
          const packet = new Uint8Array(4);
          packet[0] = data[0] || 0;
          packet[1] = data[1] || 0;
          packet[2] = data[2] || 0;
          packet[3] = 0;
          const hex = Array.from(packet).map(b => '0x' + b.toString(16).padStart(2, '0')).join(' ');
          log(`📤 USB: [${hex}]`);
          await usbDevice.transferOut(usbEndpointOut, packet);
          return true;
        } catch(e) {
          log(`❌ USB error: ${e.message}`);
          return false;
        }
      } else {
        log('⚠️ Not connected');
        return false;
      }
    }

    async function sendCC(channel, cc, value) {
      const status = 0xB0 | (channel & 0x0F);
      return await sendMIDI([status, cc, Math.min(127, Math.max(0, value))]);
    }

    async function sendPC(channel, program) {
      const status = 0xC0 | (channel & 0x0F);
      return await sendMIDI([status, Math.min(127, Math.max(0, program))]);
    }

    // ----- CONNECT: WebMIDI -----
    async function connectWebMIDI() {
      try {
        if (!navigator.requestMIDIAccess) {
          log('❌ WebMIDI not supported');
          return false;
        }

        const access = await navigator.requestMIDIAccess({ sysex: false });
        const outputs = access.outputs;

        // Find BOSS or ME-90
        let found = null;
        outputs.forEach((output, key) => {
          const name = output.name || '';
          log(`Found output: ${name}`);
          if (name.includes('ME-90') || name.includes('BOSS') || name.includes('0582')) {
            found = output;
          }
        });

        // If not found by name, use first
        if (!found && outputs.size > 0) {
          found = outputs.values().next().value;
          log('Using first available output');
        }

        if (found) {
          midiOutput = found;
          log(`✅ WebMIDI connected: ${found.name || 'Unknown'}`);
          return true;
        } else {
          log('❌ No MIDI outputs found');
          return false;
        }
      } catch(e) {
        log(`❌ WebMIDI error: ${e.message}`);
        return false;
      }
    }

    // ----- CONNECT: WebUSB -----
    async function connectWebUSB() {
      try {
        if (!navigator.usb) {
          log('❌ WebUSB not supported');
          return false;
        }

        const device = await navigator.usb.requestDevice({
          filters: [{ vendorId: 0x0582, productId: 0x02e0 }]
        });

        await device.open();
        log(`✅ Found device: ${device.productName || 'ME-90'}`);

        // Try to claim interface 5
        let claimed = false;
        let foundEndpoint = null;

        // First, try to claim all interfaces
        for (const config of device.configurations) {
          for (const iface of config.interfaces) {
            try {
              await device.claimInterface(iface.interfaceNumber);
              log(`Claimed interface #${iface.interfaceNumber}`);
              
              // Look for OUT endpoint on this interface
              for (const ep of iface.alternate.endpoints || []) {
                if (ep.direction === 'out') {
                  foundEndpoint = ep.endpointNumber;
                  log(`Found OUT endpoint: 0x${foundEndpoint.toString(16)} on interface #${iface.interfaceNumber}`);
                }
              }
              
              claimed = true;
            } catch(e) {
              // Couldn't claim this one, try next
            }
          }
        }

        if (!claimed) {
          log('❌ Could not claim any interface');
          return false;
        }

        if (foundEndpoint === null) {
          log('❌ No OUT endpoint found');
          return false;
        }

        usbDevice = device;
        usbEndpointOut = foundEndpoint;
        log('✅ WebUSB connected!');
        return true;

      } catch(e) {
        if (e.message && e.message.includes('cancelled')) {
          log('⛔ Cancelled by user');
        } else {
          log(`❌ WebUSB error: ${e.message}`);
        }
        return false;
      }
    }

    // ----- MAIN CONNECT -----
    async function connect() {
      log(`🔌 Connecting via ${currentMode.toUpperCase()}...`);
      statusMsg.textContent = `Connecting via ${currentMode.toUpperCase()}...`;
      statusLed.className = 'led warning';

      let success = false;
      if (currentMode === 'webmidi') {
        success = await connectWebMIDI();
      } else {
        success = await connectWebUSB();
      }

      if (success) {
        statusText.textContent = 'connected ✅';
        statusLed.className = 'led on';
        statusMsg.textContent = `✅ Connected via ${currentMode.toUpperCase()}`;
        setTimeout(sendAllState, 500);
      } else {
        statusText.textContent = 'failed';
        statusLed.className = 'led error';
        statusMsg.textContent = `❌ Connection failed via ${currentMode.toUpperCase()}`;
      }
    }

    // ----- SEND STATE -----
    async function sendAllState() {
      log('📤 Sending state...');
      await sendPC(0, state.bank);
      
      const fxMap = { od: CC.OD, ds: CC.DS, mod: CC.MOD, delay: CC.DELAY, reverb: CC.REVERB, chorus: CC.CHORUS };
      for (const fx of Object.keys(fxMap)) {
        await sendCC(0, fxMap[fx], state.fx[fx] ? 127 : 0);
      }

      const paramMap = { gain: CC.GAIN, tone: CC.TONE, level: CC.LEVEL, time: CC.TIME, depth: CC.DEPTH };
      for (const param of Object.keys(paramMap)) {
        await sendCC(0, paramMap[param], state.params[param]);
      }
      log('✅ State sent');
    }

    // ----- TEST -----
    async function testMIDI() {
      log('🔬 Sending test: CC#16 (OD) = 127');
      await sendCC(0, 16, 127);
      setTimeout(async () => {
        log('🔬 Sending test: CC#16 (OD) = 0');
        await sendCC(0, 16, 0);
      }, 500);
    }

    // ----- UI UPDATES -----
    function updateUI() {
      bankBtns.forEach((btn, idx) => btn.classList.toggle('active', idx === state.bank));
      fxBtns.forEach(btn => {
        btn.classList.toggle('on', state.fx[btn.dataset.fx]);
      });
      ['gain', 'tone', 'level', 'time', 'depth'].forEach(name => {
        const val = state.params[name];
        sliders[name].value = val;
        valLabels[name].textContent = val;
      });
    }

    // ----- INIT UI -----
    function initUI() {
      // Mode switching
      document.getElementById('modeWebUSB').addEventListener('click', function() {
        document.querySelectorAll('.mode-selector .btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentMode = 'webusb';
        currentModeDisplay.textContent = 'WebUSB';
        log('Switched to WebUSB mode');
      });
      document.getElementById('modeWebMIDI').addEventListener('click', function() {
        document.querySelectorAll('.mode-selector .btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentMode = 'webmidi';
        currentModeDisplay.textContent = 'WebMIDI';
        log('Switched to WebMIDI mode');
      });

      // Connect
      document.getElementById('btnConnect').addEventListener('click', connect);

      // Test
      document.getElementById('btnTest').addEventListener('click', testMIDI);

      // Bank
      bankBtns.forEach((btn, idx) => {
        btn.addEventListener('click', async () => {
          state.bank = idx;
          updateUI();
          await sendPC(0, idx);
          log(`📁 Bank ${idx + 1}`);
        });
        btn.addEventListener('touchend', e => { e.preventDefault(); btn.click(); });
      });

      // FX
      fxBtns.forEach(btn => {
        const fx = btn.dataset.fx;
        btn.addEventListener('click', async () => {
          state.fx[fx] = !state.fx[fx];
          updateUI();
          await sendCC(0, CC[fx.toUpperCase()], state.fx[fx] ? 127 : 0);
          log(`🎚️ ${fx.toUpperCase()} ${state.fx[fx] ? 'ON' : 'OFF'}`);
        });
        btn.addEventListener('touchend', e => { e.preventDefault(); btn.click(); });
      });

      // Sliders
      ['gain', 'tone', 'level', 'time', 'depth'].forEach(name => {
        const slider = sliders[name];
        slider.addEventListener('input', async () => {
          const val = parseInt(slider.value);
          state.params[name] = val;
          valLabels[name].textContent = val;
          await sendCC(0, CC[name.toUpperCase()], val);
        });
      });

      // Buttons
      document.getElementById('btnTap').addEventListener('click', async () => {
        await sendCC(0, CC.TAP, 127);
        setTimeout(async () => await sendCC(0, CC.TAP, 0), 30);
        log('⏱ TAP');
      });

      document.getElementById('btnSave').addEventListener('click', async () => {
        await sendCC(0, 80, 127);
        setTimeout(async () => await sendCC(0, 80, 0), 30);
        log('💾 Save');
      });

      document.getElementById('btnReset').addEventListener('click', async () => {
        state.bank = 0;
        state.fx = { od: false, ds: false, mod: false, delay: false, reverb: false, chorus: false };
        state.params = { gain: 60, tone: 64, level: 80, time: 50, depth: 40 };
        updateUI();
        await sendAllState();
        log('↺ Reset');
      });
    }

    // ----- START -----
    function init() {
      initUI();
      log('🔍 Select mode and tap CONNECT');
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
</script>
</body>
</html>
