<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 USB Direct</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d0f11; font-family: system-ui; padding: 12px; color: #e8edf2; }
  .app { max-width: 500px; margin: 0 auto; background: #1a1e22; border-radius: 28px; padding: 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 14px; border-bottom: 1px solid #282d33; margin-bottom: 16px; }
  .btn { background: #1f242a; border: 1px solid #313840; border-radius: 30px; padding: 14px; text-align: center; font-weight: 600; color: #aab3bd; cursor: pointer; }
  .btn:active { transform: scale(0.92); }
  .btn.primary { background: #2a4b74; border-color: #3b82f6; color: white; }
  .log { background: #0d1013; border-radius: 12px; padding: 8px 12px; font-size: 11px; font-family: monospace; color: #6b757f; border: 1px solid #21262c; min-height: 60px; margin-top: 8px; white-space: pre-wrap; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🎛️ ME-90 <span style="font-size:12px;color:#7e8892;">direct</span></h1>
  </div>
  
  <button class="btn primary" id="btnConnect" style="width:100%;margin-bottom:14px;">🔌 CONNECT</button>
  
  <div class="log" id="logArea">Press CONNECT to try direct USB access</div>
  
  <div style="margin-top:14px;font-size:12px;color:#7e8892;text-align:center;">
    ⚠️ Android may block direct USB access without root.<br>
    Try BOSS TONE STUDIO app instead!
  </div>
</div>

<script>
document.getElementById('btnConnect').addEventListener('click', async function() {
  const log = document.getElementById('logArea');
  log.textContent = '🔍 Requesting USB device...';
  
  try {
    if (!navigator.usb) {
      log.textContent = '❌ WebUSB not supported';
      return;
    }
    
    const device = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0582, productId: 0x02e0 }]
    });
    
    log.textContent = `✅ Found: ${device.productName}`;
    
    await device.open();
    log.textContent += '\n✅ Device opened';
    
    // Try to claim all interfaces
    let claimed = false;
    for (const config of device.configurations) {
      for (const iface of config.interfaces) {
        try {
          await device.claimInterface(iface.interfaceNumber);
          log.textContent += `\n✅ Claimed interface #${iface.interfaceNumber}`;
          claimed = true;
        } catch(e) {
          log.textContent += `\n❌ Failed to claim #${iface.interfaceNumber}: ${e.message}`;
        }
      }
    }
    
    if (!claimed) {
      log.textContent += '\n\n❌ Could not claim any interface';
      log.textContent += '\n📱 This usually requires root on Android';
      log.textContent += '\n💡 Try BOSS TONE STUDIO app instead!';
    }
    
  } catch(e) {
    if (e.message && e.message.includes('cancelled')) {
      log.textContent = '⛔ Cancelled';
    } else {
      log.textContent = `❌ ${e.message}`;
    }
  }
});
</script>
</body>
</html>
