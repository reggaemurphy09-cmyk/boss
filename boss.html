<!DOCTYPE html>
<html>
<body>
<button onclick="test()">Test ME-90</button>
<pre id="log"></pre>

<script>
const log = m => document.getElementById("log").textContent += m + "\n";

async function test() {
  try {
    const device = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0582, productId: 0x02e0 }]
    });

    await device.open();
    log("Device Opened");

    if (!device.configuration) {
      await device.selectConfiguration(1);
      log("Configuration selected");
    }

    await device.claimInterface(3);
    log("Interface ID 3 claimed");

    await device.selectAlternateInterface(3, 0);
    log("Alternate 3:0 selected");

    const data = new Uint8Array([0xC0, 0x00]);
    await device.transferOut(3, data);

    log("Data sent to OUT endpoint 3");

  } catch (e) {
    log("ERROR: " + e.message);
  }
}
</script>
</body>
</html>
