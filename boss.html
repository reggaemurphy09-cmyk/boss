<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 Live Laptop</title>
<style>
body{margin:0;background:#05070a;color:white;font-family:Arial,sans-serif;overflow:hidden}
.app{height:100vh;width:100vw;padding:12px;box-sizing:border-box;display:grid;grid-template-rows:55px 1fr 180px;gap:10px}
.header{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:28px;font-weight:900}
.connect{background:#16331c;color:#5dff4a;border:1px solid #2cff44;border-radius:10px;padding:10px 18px;font-weight:bold}
.main{display:grid;grid-template-columns:280px 1fr 280px;gap:10px;min-height:0}
.card{background:#0d1217;border:1px solid #25313b;border-radius:16px;padding:16px;box-sizing:border-box}
.patchBox{text-align:center}
.bank{font-size:58px;color:#2f9bff;font-weight:900}
.patchNo{font-size:80px;font-weight:900}
.patchName{font-size:38px;font-weight:900;margin:15px 0}
.effects{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.fx{border:2px solid #333;border-radius:14px;padding:22px;text-align:center;font-size:22px;font-weight:800}
.fx.on{border-color:#4cff38;color:#4cff38}
.fx.selected{border-color:#ffb02e;color:#ffb02e}
.expTitle{color:#4cff38;font-size:18px;text-align:center;font-weight:bold}
.expMode{font-size:45px;color:#4cff38;font-weight:900;text-align:center}
.expValue{font-size:70px;color:#4cff38;font-weight:900;text-align:center}
.expBar{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.seg{width:8px;height:24px;background:#1d252c;border-radius:3px}
.seg.on{background:#4cff38}
.stomps{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stomp{background:#0d1217;border:2px solid #333;border-radius:16px;text-align:center;padding:12px;font-weight:bold}
.stomp.on{border-color:#4cff38;color:#4cff38}
.stomp.off{color:#777}
.stompName{font-size:26px;margin-top:18px}
.statusLine{display:flex;justify-content:space-around;margin-top:14px;font-size:18px}
.log{font-family:monospace;font-size:11px;color:#6cff59;margin-top:10px;height:70px;overflow:hidden;text-align:left}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">BOSS ME-90 LIVE</div>
    <button class="connect" onclick="connectMIDI()" id="connectBtn">● CONNECT ME-90</button>
  </div>

  <div class="main">
    <div class="card patchBox">
      <div>BANK</div>
      <div class="bank" id="bank">U2</div>
      <div>PATCH</div>
      <div class="patchNo" id="patchNo">1</div>
      <div class="statusLine">
        <div>Tempo <span style="color:#2f9bff">120</span></div>
        <div>CTL <span style="color:#4cff38">ON</span></div>
      </div>
      <div class="log" id="log">Ready...</div>
    </div>

    <div class="card">
      <div>PATCH NAME</div>
      <div class="patchName" id="patchName">ROCK LEAD</div>
      <h3>ACTIVE EFFECTS</h3>
      <div class="effects" id="effects"></div>
    </div>

    <div class="card">
      <div class="expTitle">EXPRESSION PEDAL</div><br>
      <div>MODE</div>
      <div class="expMode" id="expMode">WAH</div>
      <div>LEVEL</div>
      <div class="expValue" id="expValue">82</div>
      <div class="expBar" id="expBar"></div>
    </div>
  </div>

  <div class="stomps" id="stomps"></div>
</div>

<script>
let midiAccess, midiInput, midiOutput;

let state = {
  bank:"U2",
  patch:1,
  patchName:"ROCK LEAD",
  expMode:"WAH",
  expValue:82,
  effects:[
    {name:"COMP",on:true,selected:false},
    {name:"BOOST",on:true,selected:false},
    {name:"PREAMP",on:true,selected:true},
    {name:"EQ",on:true,selected:false},
    {name:"DELAY",on:true,selected:false},
    {name:"REVERB",on:true,selected:false}
  ],
  stomps:[
    {num:"①",name:"COMP",on:true},
    {num:"②",name:"BOOST",on:true},
    {num:"③",name:"MOD",on:false},
    {num:"④",name:"DELAY",on:true},
    {num:"CTL",name:"REVERB",on:true}
  ]
};

function log(msg){
  const t = new Date().toLocaleTimeString();
  document.getElementById("log").textContent = `[${t}] ${msg}\n` + document.getElementById("log").textContent;
}

function render(){
  bank.textContent = state.bank;
  patchNo.textContent = state.patch;
  patchName.textContent = state.patchName;
  expMode.textContent = state.expMode;
  expValue.textContent = state.expValue;

  effects.innerHTML = "";
  state.effects.filter(e=>e.on).forEach(e=>{
    effects.innerHTML += `<div class="fx ${e.selected ? "selected" : "on"}">${e.name}</div>`;
  });

  stomps.innerHTML = "";
  state.stomps.forEach((s,i)=>{
    stomps.innerHTML += `
      <div class="stomp ${s.on ? "on" : "off"}" onclick="selectStomp(${i})">
        <div>${s.num}</div>
        <div class="stompName">${s.name}</div>
        <div>${s.on ? "ON" : "OFF"}</div>
      </div>`;
  });

  expBar.innerHTML = "";
  for(let i=1;i<=30;i++){
    expBar.innerHTML += `<div class="seg ${i <= state.expValue/3.33 ? "on" : ""}"></div>`;
  }
}

async function connectMIDI(){
  try{
    if(!navigator.requestMIDIAccess){
      alert("Use Chrome or Edge");
      return;
    }

    midiAccess = await navigator.requestMIDIAccess({sysex:true});
    const inputs = Array.from(midiAccess.inputs.values());
    const outputs = Array.from(midiAccess.outputs.values());

    midiInput = inputs.find(i=>/me-?90|boss/i.test(i.name)) || inputs[0];
    midiOutput = outputs.find(o=>/me-?90|boss/i.test(o.name)) || outputs[0];

    if(midiInput){
      midiInput.onmidimessage = handleMIDI;
      log("Listening: " + midiInput.name);
    }

    if(midiOutput){
      log("Output: " + midiOutput.name);
    }

    connectBtn.textContent = "● CONNECTED";
  }catch(e){
    log("Error: " + e.message);
  }
}

function handleMIDI(e){
  const d = Array.from(e.data);
  const hex = d.map(x=>x.toString(16).padStart(2,"0").toUpperCase()).join(" ");
  log("IN " + hex);

  const type = d[0] & 0xF0;

  if(type === 0xC0){
    state.patch = d[1] + 1;
    render();
  }

  if(type === 0xB0){
    if(d[1] === 7 || d[1] === 11){
      state.expValue = d[2];
      render();
    }
  }
}

function selectStomp(index){
  state.stomps[index].on = !state.stomps[index].on;

  state.effects.forEach(e=>e.selected=false);
  const target = state.effects.find(e=>e.name === state.stomps[index].name);
  if(target){
    target.on = state.stomps[index].on;
    target.selected = true;
  }

  render();
}

render();
</script>
</body>
</html>
