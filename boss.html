<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME-90 USB Test v2</title>
<style>
body{font-family:monospace;background:#0a0a0f;color:#0f0;padding:16px;margin:0}
button{background:#ff3333;color:#fff;border:none;padding:14px 20px;font-size:15px;border-radius:6px;width:100%;margin-bottom:10px}
button:active{background:#cc0000}
button.alt{background:#00ccff;color:#000}
pre{white-space:pre-wrap;word-break:break-all;font-size:12px;line-height:1.5;background:#111;padding:12px;border-radius:6px;border:1px solid #333}
h2{color:#0cf;font-size:15px}
</style>
</head>
<body>

<h2>BOSS ME-90 — Interface 1/Alt 1 Test</h2>
<button onclick="connectAndClaim()">1. Connect + Claim Interface 1</button>
<button class="alt" onclick="trySend()">2. Try Send Test SysEx</button>
<button onclick="clearLog()" style="background:#444">Clear Log</button>

<pre id="log">Step 1: Tap "Connect + Claim Interface 1"
This targets interface 1 (MIDIStreaming class,
subclass 2, protocol 2) confirmed from your
device dump - alternate setting 1 has the
endpoint, alternate 0 is empty/idle.</pre>

<script>
let logEl = document.getElementById("log");
let dev = null;
let outEndpoint = null;

function append(text) {
  logEl.textContent += "\n" + text;
}
function clearLog() {
  logEl.textContent = "";
}

async function connectAndClaim() {
  clearLog();
  try {
    dev = await navigator.usb.requestDevice({
      filters: [{ vendorId: 0x0582 }] // BOSS, decimal 1410
    });
    append("Selected: " + dev.productName);

    await dev.open();
    append("✅ Opened");

    if (!dev.configuration) {
      await dev.selectConfiguration(1);
    }
    append("✅ Configuration set: " + dev.configuration.configurationValue);

    // Claim interface 1 (the MIDIStreaming one)
    await dev.claimInterface(1);
    append("✅ Claimed interface 1");

    // Switch to alternate setting 1 (the one with the actual endpoint)
    await dev.selectAlternateInterface(1, 1);
    append("✅ Selected alternate setting 1 on interface 1");

    // Find the interface object to inspect its endpoints
    const iface = dev.configuration.interfaces.find(i => i.interfaceNumber === 1);
    const alt = iface.alternates.find(a => a.alternateSetting === 1);

    append("\nEndpoints on Interface 1 / Alt 1:");
    for (const ep of alt.endpoints) {
      append("  EP" + ep.endpointNumber +
        " dir=" + ep.direction +
        " type=" + ep.type +
        " packetSize=" + ep.packetSize);
      if (ep.direction === "out") {
        outEndpoint = ep.endpointNumber;
      }
    }

    if (outEndpoint) {
      append("\n✅ Found OUT endpoint: " + outEndpoint);
      append("Ready for step 2 — try sending test data.");
    } else {
      append("\n⚠️ No OUT endpoint found on this alt setting.");
      append("This interface might be INPUT only (device->phone).");
      append("Check other interfaces (0, 2, 3, 4...) similarly.");
    }

  } catch (e) {
    append("❌ Error: " + e.message);
  }
}

async function trySend() {
  if (!dev || !outEndpoint) {
    append("\n⚠️ Run step 1 first and confirm an OUT endpoint exists.");
    return;
  }

  try {
    // USB-MIDI packets are 4 bytes per event (USB-MIDI Event Packet format):
    // [Cable+CodeIndexNumber, MIDI byte0, MIDI byte1, MIDI byte2]
    // Test: send a single Note On (just as a "is anything happening" probe)
    // CIN 0x09 = Note On, channel 0, note 60, velocity 100
    const testPacket = new Uint8Array([0x09, 0x90, 0x3C, 0x64]);

    append("\nSending test USB-MIDI packet: " +
      Array.from(testPacket).map(b => b.toString(16).padStart(2,"0")).join(" "));

    const result = await dev.transferOut(outEndpoint, testPacket);
    append("✅ transferOut result: status=" + result.status +
      " bytesWritten=" + result.bytesWritten);

  } catch (e) {
    append("❌ Send failed: " + e.message);
  }
}
</script>

</body>
</html>
